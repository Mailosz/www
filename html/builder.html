<!DOCTYPE html>
<body>
    <script type="module">
    import {Builder} from "../js/utils/DocBuilder.js";

    new Builder(document)
        .with(builder => {
            builder.children(
                builder.tag("h1").innerText("Hello world!"),
                builder.tag("p").innerText("This is a paragraph."),
                builder.tag("div")
                    .attr("class", "container")
                    .children(
                        builder.tag("span").innerText("This is a span inside a div.")
                    )
                
            );
        });



    </script>
</body>
