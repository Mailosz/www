        ox-paging {
            font-size: 20px;
        }


        .menu {
            display: flex;
            flex-direction: column;
            max-width: 400px;
        }

        .menu button {
            border: none;
            border-radius: 0;
            background-color: #eee;
            padding: 0.5em 1em;
            text-align: left;
            outline: none;
            anchor-name: --button;
        }

        .menu button:focus {
            background-color: var(--weak-accent-color, cornflowerblue);
        }

        .menu[popover] {
            display: none;
            border: 1px solid #555;
            padding: 0;
            box-shadow: 0 2px 10px rgba(127,127,127,0.4);
            background-color: white;
            margin: 0;
            position-anchor: --button;
            position: absolute;
            left: anchor(right);
            top: anchor(top);
            opacity: 0;
            transition: opacity 1500ms ease-in-out, display 1500ms allow-discrete;
        }

        .menu:popover-open {
            display: flex;
            flex-direction: column;
            opacity: 1;

            @starting-style {
                opacity: 0;
            }
        }


    </style>
</head>
