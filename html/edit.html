        }

        #node-tree .selection-start {
            background-color: #dff6fe;
        }

        #node-tree .selection-start::before {
            content: attr(offset-start);
            margin-right: 1em;
        }

        #node-tree .selection-end {
            background-color: #ffaa77;
        }

        #node-tree .selection-end::after {
            content: attr(offset-end);
            margin-left: 1em;
        }

        #node-tree .selection-start.selection-end {
            background-color: #88ee77;
        }

        .input-box {
            caret-color: transparent;
        }

        .selection-caret {
            width: 1px;
            backdrop-filter: invert(100%) contrast(1.5);
            user-select: none;
            pointer-events: none;
            animation: caret-blink 1000ms infinite;
        }

        @keyframes caret-blink {
            0% {opacity: 1;}
            50% {opacity: 1;}
            75% {opacity: 0;}
            100% {opacity: 1;}
        }
    </style>

<script type="module">
    import {MutationUndoer} from "../js/utils/MutationUndoer.js";



    document.getElementById("bold-button").onclick = () => {
        
        let selection = document.getSelection();

        /**
         *
         * @param {Selection} selection
         * @param {function(Range)} fn
         */
        forEveryRange(selection, (range) => {
            if (!range.collapsed) {

                let ancestorValue = getAncestorElement(range.commonAncestorContainer).computedStyleMap().get("font-weight");
                let contents = extractSelection(range);
                
                
                if (!ancestorValue || ancestorValue == "inherit" || ancestorValue == "normal" || ancestorValue == "400") {
                        
                    forEveryNodeInDocumentFragment(contents, (element) => {
                        let value = element.computedStyleMap().get("font-weight");
                        if (!value || value == "inherit" || value == "normal" || value == "400") {
                            element.style.fontWeight = "bold";
                        }
                    });

                } else {

                    forEveryNodeInDocumentFragment(contents, (element) => {
                        let value = element.computedStyleMap().get("font-weight");
                        if (value != "inherit" && value != "normal" && value != "400") {
                            element.style.fontWeight = "400";
                        }
                    });
                }
            
                
                
                
                range.insertNode(contents);
                
            }
        });

        print();
    };


    /**
     * @param {Node} node
     * @returns {HTMLElement}
     */
    function getAncestorElement(node) {
        while (node != null) {
            if (node.nodeType === Node.ELEMENT_NODE) {
                return node;
            }
            node = node.parentNode;
        }
        throw new Error("No common element found");
    }

    /**
     * @param {Range} range
     * @returns {DocumentFragment}
     */
    function extractSelection(range) {
        let contents = range.extractContents();

        let child = contents.firstChild;
        while (child != null) {
            
            if (child.nodeType === Node.TEXT_NODE) {
                let span = document.createElement("span");
                span.textContent = child.textContent;
                contents.replaceChild(span, child);
            }

            child = child.nextSibling;
        }

        return contents;
    }

    /**
     * @param {Selection} selection
     * @param {function(Range)} fn
     */
    function forEveryRange(selection, fn) {
        for (let i = 0; i < selection.rangeCount; i++) {
            let range = selection.getRangeAt(i);
            fn(range);
        }
    }

    /**
     * @param {DocumentFragment} fragment
     * @param {function(HTMLElement)} fn
     */
    function forEveryNodeInDocumentFragment(fragment, fn) {
        let walker = fragment.ownerDocument.createTreeWalker(fragment.getRootNode(), NodeFilter.SHOW_ELEMENT);

        while (walker.nextNode()) {
            let element = walker.currentNode;
            fn(element);
        }
    }

    /**
     *
     * @param {HTMLElement} root
     * @param {HTMLElement} target
     */
    function printNodeTree(root, target) {
        if (root != null) {
            let node = printNode(root);
            target.appendChild(node);

            let child = root.firstChild;
            while (child != null) {
                printNodeTree(child, node)
                child = child.nextSibling;
            }
        }
    }

    /**
     *
     * @param {Node} node
     */
    function printNode(node) {
        let div = document.createElement("div");
        if (node.nodeType === Node.TEXT_NODE) {
            div.innerText = node.textContent;
        } else {
            div.innerText = "<" + node.nodeName.toLowerCase() + ">";
        }
        div.nodeRef = node;
        div.classList.add("node-element");
        node.nodeRef = div;

        return div;
    }

    /**
     *
     * @param {Selection} selection
     */
    function updateSelection(selection) {



        document.querySelectorAll(".selection-start").forEach((element) => {element.classList.remove("selection-start");});
        document.querySelectorAll(".selection-end").forEach((element) => {element.classList.remove("selection-end");});
        document.querySelectorAll(".selected-element").forEach((e)=>e.classList.remove("selected-element"));

        document.querySelectorAll(".selection-range").forEach((e)=>e.remove());
        document.querySelectorAll(".selection-caret").forEach((e)=>e.remove());

        for (let i = 0; i < selection.rangeCount; i++) {

            let range = selection.getRangeAt(i)

            updateSelectionRange(range);
        }

    }

    /**
     *
     * @param {Range} range
     */
    function updateSelectionRange(range) {

        if (range.collapsed) {
            let rects = range.getClientRects();
            for (let rect of rects) {
                let el = document.createElement("div");
                el.classList.add("selection-caret");
                el.style.left = rect.left + window.scrollX + "px";
                el.style.top = rect.top + window.scrollY + "px";
                el.style.width = 1 + "px";
                el.style.height = rect.height + "px";
                el.style.position = "absolute";
                document.body.appendChild(el);
            }
        }

        let element = range.commonAncestorContainer;
        if (element.nodeType === Node.ELEMENT_NODE) {
            // let node = element.childNodes.item(range.st)
            element.classList.add("selected-element");
        }

        let start = range.startContainer.nodeRef;
        if (start) {
            start.classList.add("selection-start");
            start.setAttribute("offset-start", range.startOffset);
        }

        let end = range.endContainer.nodeRef;
        if (end) {
            end.classList.add("selection-end");
            end.setAttribute("offset-end", range.endOffset);
        }
    }

</script>
