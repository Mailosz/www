<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor</title>
    <style>

        body {
            line-height: 2;
        }

        main * {
            margin: 5px;
            padding: 5px;
            border: 1px solid transparent;
            outline: 3px solid #eee;
            border-radius: 4px;

            &:hover:not(:has(:hover)) {
                background-color: lightgreen;
            }
        }

        .selected {
            outline-color: lightcoral;
        }

        ::highlight(selection) {
            background-color: lightblue;
            color: red;
            outline: 3px solid blue
        }

        .boldize {
            font-weight: bold;
        }
    </style>
</head>
<body onselectionchange="selectionChange();">
    <button onclick="showSelection();">Select</button>
    <button onclick="boldize(event);" id="bold-button">b</button>
    <main>
        <div><span><b class="selected">Text 1</b><span>Text 2</span></span><span>Text 3</span><span><span>Abc</span><span>Def</span></span></div>

    </main>


    <script type="module">
        import { forNodesInRange, forRange } from "../js/ox/utils/Edit.js";
        let selChangeTimeout = null;

        window.selectionChange = function() {
            clearTimeout(selChangeTimeout);
            selChangeTimeout = setTimeout(() => {
                
                let sel = window.getSelection();
                if (sel.rangeCount === 0) {
                    return;
                }
                let range = sel.getRangeAt(0);

                let anyBold = false;
                forRange(range, (node) => {
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        const computedStyle = getComputedStyle(node);
                        if (computedStyle.fontWeight === "bold" || computedStyle.fontWeight >= 700) {
                            anyBold = true;
                        }
                    }
                }, () => {});

                const boldButton = document.getElementById("bold-button");
                if (anyBold) {
                    boldButton.classList.remove("boldize");
                } else {
                    boldButton.classList.add("boldize");
                }

            }, 200);


        }

        window.boldize = function(event) {
            if (event.currentTarget.classList.contains("boldize")) {
                let sel = window.getSelection();
                if (sel.rangeCount === 0) {
                    return;
                }
                let range = sel.getRangeAt(0);

                forNodesInRange(range, (node) => {
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        node.style.fontWeight = "bold";
                    } else {
                        let span = document.createElement("span");
                        node.replaceWith(span);
                        span.insertBefore(node, null);
                        span.style.fontWeight = "bold";
                    }
                });
                event.currentTarget.classList.remove("boldize");
            } else {
                let sel = window.getSelection();
                if (sel.rangeCount === 0) {
                    return;
                }
                let range = sel.getRangeAt(0);

                forNodesInRange(range, (node) => {
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        node.style.fontWeight = "normal";
                    } else {
                        let span = document.createElement("span");
                        node.replaceWith(span);
                        span.insertBefore(node, null);
                        span.style.fontWeight = "normal";
                    }
                });
                event.currentTarget.classList.add("boldize");
            }

        }

        window.showSelection = function() {
            document.querySelectorAll(".selected").forEach(el => el.classList.remove("selected"));
            CSS.highlights.clear();
            CSS.highlights.set("selection", new Highlight());

            let sel = window.getSelection();
            if (sel.rangeCount === 0) {
                return;
            }
            let range = sel.getRangeAt(0);
            
            forNodesInRange(range, selectNode);
            // let list = [];
            // forNodesInRange(range, (node) => list.push(node));
            // list.forEach(node => selectNode(node));
        
        }



        function selectNode(node) {
            if (node.nodeType === Node.ELEMENT_NODE) {
                node.classList.add("selected");
            } else {
                // let span = document.createElement("span");
                // node.replaceWith(span);
                // span.insertBefore(node, null);
                // span.classList.add("selected");
                let highlight = CSS.highlights.get("selection");
                let range = document.createRange();
                range.selectNode(node);
                highlight.add(range);
            }
        }

    </script>
</body>
</html>
