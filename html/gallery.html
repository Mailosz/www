<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <script type="module" src="../js/ox/controls/OxGallery.js"></script>
</head>
<body>
    <ox-gallery>
        <img src="../res/backgrounds/Las.jpg" alt="A">
        <img src="../res/backgrounds/Szczyt.jpg" alt="B">
        <img src="../res/backgrounds/Zbocze.jpg" alt="C">
        <img src="../res/backgrounds/Śnieg.jpg" alt="D">
        <button onclick="console.log('test')">Test</button>
        <button onclick="console.log('test 2')" style="width: 50px; height: 20px;">Test 2</button>
    </ox-gallery>
    <script type="module">
        import {Builder} from "../js/ox/Builder.js";

        let gallery = document.querySelector("ox-gallery");
        
        let builder = new Builder(document);

        console.log(gallery.children);
        setTimeout(() => {
            gallery.append(builder.tag("img").attr("src", "../res/backgrounds/Las.jpg").build());
            gallery.insertBefore(builder.tag("button").innerText("src").build(), gallery.firstChild);
            gallery.append(builder.tag("img").attr("src", "../res/backgrounds/Las.jpg").build());
            gallery.append(builder.tag("img").attr("src", "../res/backgrounds/Las.jpg").build());
            gallery.append(builder.tag("img").attr("src", "../res/backgrounds/Las.jpg").build());
        }, 1000);
        
    </script>
</body>
</html>
