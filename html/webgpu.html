<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU</title>
</head>
<body>
    <div style="border: 2px black solid; display: block; position: absolute; left: 20px; top: 20px; bottom: 20px; right: 20px;">
        <canvas id="view-canvas" width="400" height="300" style="width: 100%; height: 100%;">

        </canvas>
    </div>
      <script type="module">
        import { CanvasManager } from "../js/canvas/CanvasManager.js";
        import { WebGpuRenderManager} from "../js/canvas/webgpu/WebGpuRenderManager.js";
        import { ViewportStateManager } from "../js/canvas/ViewportStateManager.js";
        import { ViewportInputManager } from "../js/canvas/ViewportInputManager.js";

        function initialize() {
            let canvas = document.getElementById('view-canvas');
            let cm = new CanvasManager(canvas);
            cm.setRenderManager(new WebGpuRenderManager());
            cm.setStateManager(new ViewportStateManager());
            cm.setInputManager(new ViewportInputManager());
        }

        initialize();
    </script>
</body>
</html>
