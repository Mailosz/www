<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="module" src="./controls/OxChoose.js"></script>
    <script type="module" src="./controls/OxWhen.js"></script>
</head>
<body>
    <section>
        <p>&lt;ox-choose&gt;<br>
            <button onclick="document.querySelector('ox-choose').show('#first')">show('#first')</button>
            <button onclick="document.querySelector('ox-choose').show('#second')">show('#second')</button>
            <button onclick="document.querySelector('ox-choose').show(1)">show(1)</button>
            <button onclick="document.querySelector('ox-choose').show(2)">show(2)</button>
            <button onclick="document.querySelector('ox-choose').show('span')">show('span')</button>
            <ox-choose query="#first">
                <span id="first">First</span>
                <span id="first">First</span>
                <span id="second">Second</span>
                <span id="second">Second</span>
            </ox-choose>
        </p>
        <p>&lt;ox-choose multiple&gt;<br>
            <button onclick="document.querySelector('#ox-choose-multiple').show('#first')">show('#first')</button>
            <button onclick="document.querySelector('#ox-choose-multiple').show('#second')">show('#second')</button>
            <button onclick="document.querySelector('#ox-choose-multiple').show(1)">show(1)</button>
            <button onclick="document.querySelector('#ox-choose-multiple').show(2)">show(2)</button>
            <button onclick="document.querySelector('#ox-choose-multiple').show('span')">show('span')</button>
            <ox-choose id="ox-choose-multiple" query="#first" multiple>
                <span id="first">First</span>
                <span id="first">First</span>
                <span id="second">Second</span>
                <span id="second">Second</span>
            </ox-choose>
        </p>
    </section>

</body>
</html>
